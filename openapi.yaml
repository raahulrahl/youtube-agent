          minimum: 0
          default: 0
    TasksListResult:
      type: object
      properties:
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/MessageSendResult'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
    # TasksCancel
    TasksCancelParams:
      type: object
      required:
        - taskId
      properties:
        taskId:
          type: string
          format: uuid
    TasksCancelResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
    # TasksFeedback
    TasksFeedbackParams:
      type: object
      required:
        - taskId
        - feedback
      properties:
        taskId:
          type: string
          format: uuid
        feedback:
          type: string
        rating:
          type: integer
          minimum: 1
          maximum: 5
        metadata:
          type: object
    TasksFeedbackResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
    # ContextsList
    ContextsListParams:
      type: object
      properties:
        length:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
    ContextsListResult:
      type: object
      properties:
        contexts:
          type: array
          items:
            type: object
            properties:
              context_id:
                type: string
                format: uuid
              created_at:
                type: string
                format: date-time
              last_updated:
                type: string
                format: date-time
        total:
          type: integer
    # ContextsClear
    ContextsClearParams:
      type: object
      required:
        - contextId
      properties:
        contextId:
          type: string
          format: uuid
    ContextsClearResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
    # Agent Card
    AgentCard:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        url:
          type: string
          format: uri
        version:
          type: string
        protocolVersion:
          type: string
        skills:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
              documentationPath:
                type: string
        capabilities:
          type: object
        kind:
          type: string
          enum: ['agent']
        agentTrust:
          type: string
          enum: ['low', 'medium', 'high']
        defaultInputModes:
          type: array
          items:
            type: string
        defaultOutputModes:
          type: array
          items:
            type: string
    # DID Document
    DidDocument:
      type: object
