name: Build and Push to Docker Hub

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile.agent'
      - 'youtube_agent/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.version'
      - '.github/workflows/build-and-push.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: para5
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Read version
        id: version
        run: |
          echo "version=$(cat .version | tr -d '\n')" >> $GITHUB_OUTPUT

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.agent
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            para5/youtube-agent:latest
            para5/youtube-agent:${{ steps.version.outputs.version }}
            para5/youtube-agent:build-${{ github.run_number }}
            para5/youtube-agent:${{ github.sha }}
          cache-from: type=registry,ref=para5/youtube-agent:buildcache
          cache-to: type=registry,ref=para5/youtube-agent:buildcache,mode=max

      - name: Read agent config
        id: agent_config
        run: |
          echo "config=$(cat youtube_agent/agent_config.json | jq -c .)" >> $GITHUB_OUTPUT
          echo "version=$(cat .version | tr -d '\n')" >> $GITHUB_OUTPUT

          # Read all skills from the skills folder
          skills_array="[]"
          for skill_dir in youtube_agent/skills/*/; do
            if [ -f "${skill_dir}skill.yaml" ]; then
              skill_json=$(cat "${skill_dir}skill.yaml" | yq -o=json | jq -c .)
              skills_array=$(echo "$skills_array" | jq --argjson skill "$skill_json" '. += [$skill]')
            fi
          done
          echo "skills=$(echo $skills_array | jq -c .)" >> $GITHUB_OUTPUT

      - name: Register agent deployment
        id: register
        run: |
          response=$(curl -w "\n%{http_code}" --location 'https://bindus.getbindu.com/bindu-register' \
            --header 'accept: application/json' \
            --header 'X-Bindu-CI: true' \
            --header 'X-API-Token: ${{ secrets.BINDU_API_TOKEN }}' \
            --header 'Content-Type: application/json' \
            --data-raw '{
              "agent": {
                "name": "${{ fromJson(steps.agent_config.outputs.config).name }}",
                "author": "${{ fromJson(steps.agent_config.outputs.config).author }}",
                "description": "${{ fromJson(steps.agent_config.outputs.config).description }}",
                "version": "${{ steps.agent_config.outputs.version }}",
                "agent_trust": "${{ fromJson(steps.agent_config.outputs.config).agent_trust }}",
                "type": "research"
              },
              "skills": ${{ toJson(fromJson(steps.agent_config.outputs.skills)) }},
              "framework": {
                "name": "agno",
                "version": "1.0.0"
              },
              "environment_variables": ${{ toJson(fromJson(steps.agent_config.outputs.config).environment_variables) }},
              "execution_cost": ${{ toJson(fromJson(steps.agent_config.outputs.config).execution_cost || fromJson('{}')) }},
              "auth": ${{ toJson(fromJson(steps.agent_config.outputs.config).auth || fromJson('{}')) }},
              "deployment": {
                "url": "${{ fromJson(steps.agent_config.outputs.config).deployment.url }}",
                "protocol_version": "${{ fromJson(steps.agent_config.outputs.config).deployment.protocol_version }}",
                "docker_image": "para5/youtube-agent:latest",
                "docker_digest": "${{ steps.docker_build.outputs.digest }}",
                "platforms": ["linux/amd64", "linux/arm64"]
              },
              "repository": {
                "url": "https://github.com/${{ github.repository }}",
                "commit_sha": "${{ github.sha }}",
                "build_number": "${{ github.run_number }}"
              },
              "metadata": {
                "documentation_url": "https://raahulrahl.github.io/youtube-agent/",
                "domain": "${{ fromJson(steps.agent_config.outputs.config).metadata.domain || 'general' }}",
                "specialization": "${{ fromJson(steps.agent_config.outputs.config).metadata.specialization || 'multi-purpose' }}",
                "last_updated": "${{ github.event.head_commit.timestamp }}"
              }
            }')

          # Extract HTTP status code and body
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "HTTP Status: $http_code"
          echo "Registration response: $body"

          # Check if request was successful
          if [ "$http_code" != "200" ]; then
            echo "❌ Registration failed with HTTP $http_code"
            echo "Response: $body"
            exit 1
          fi

          # Parse response
          agent_id=$(echo "$body" | jq -r '.agent_id')
          deployment_id=$(echo "$body" | jq -r '.id')
          status=$(echo "$body" | jq -r '.message')

          # Validate extracted values
          if [ "$agent_id" = "null" ] || [ -z "$agent_id" ]; then
            echo "❌ Failed to extract agent_id from response"
            exit 1
          fi

          if [ "$deployment_id" = "null" ] || [ -z "$deployment_id" ]; then
            echo "❌ Failed to extract deployment_id from response"
            exit 1
          fi

          echo "agent_id=$agent_id" >> $GITHUB_OUTPUT
          echo "deployment_id=$deployment_id" >> $GITHUB_OUTPUT
          echo "✅ Registration successful: $status"
          echo "📦 Agent ID: $agent_id"
          echo "🚀 Deployment ID: $deployment_id"

      - name: Wait for deployment to complete
        run: |
          agent_id=${{ steps.register.outputs.agent_id }}
          deployment_id=${{ steps.register.outputs.deployment_id }}

          echo "🚀 Waiting for Argo deployment to complete..."
          echo "Agent ID: $agent_id"
          echo "Deployment ID: $deployment_id"

          max_attempts=60  # 10 minutes (60 * 10 seconds)
          attempt=0

          while [ $attempt -lt $max_attempts ]; do
            status_response=$(curl -s -w "\n%{http_code}" "https://bindus.getbindu.com/agents/$agent_id/deployment/$deployment_id/status")

            http_code=$(echo "$status_response" | tail -n1)
            body=$(echo "$status_response" | sed '$d')

            if [ "$http_code" != "200" ]; then
              echo "⚠️  Status check failed with HTTP $http_code (attempt $((attempt + 1))/$max_attempts)"
              echo "Response: $body"
              sleep 10
              attempt=$((attempt + 1))
              continue
            fi

            deployment_status=$(echo "$body" | jq -r '.status // .deployment_status // "unknown"')
            echo "⏳ Deployment status: $deployment_status (attempt $((attempt + 1))/$max_attempts)"

            if [ "$deployment_status" = "succeeded" ]; then
              deployment_url=$(echo "$body" | jq -r '.deployment_url // "N/A"')
              health_check_url=$(echo "$body" | jq -r '.health_check_url // "N/A"')
              grafana_url=$(echo "$body" | jq -r '.grafana_dashboard_url // "N/A"')

              echo "✅ Deployment succeeded!"
              echo "🚀 Agent URL: $deployment_url"
              echo "❤️  Health Check: $health_check_url"
              echo "📊 Grafana Dashboard: $grafana_url"
              exit 0
            elif [ "$deployment_status" = "failed" ]; then
              error=$(echo "$body" | jq -r '.deployment_error // .error // "Unknown error"')
              echo "❌ Deployment failed: $error"
              exit 1
            fi

            # Still deploying (pending or deploying status), wait and retry
            sleep 10
            attempt=$((attempt + 1))
          done

          echo "❌ Deployment timed out after 10 minutes"
          echo "Last status: $deployment_status"
          exit 1
